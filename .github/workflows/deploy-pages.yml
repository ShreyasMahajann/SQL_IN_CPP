name: Build and Publish GitHub Pages Site

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EM_CACHE: ${{ github.workspace }}/.cache/emscripten
      EM_COMPILER_WRAPPER: ccache
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore Emscripten cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/emscripten
          key: ${{ runner.os }}-emscripten-cache-v1

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('src/**/*.cpp', 'include/**/*.h', '.github/workflows/deploy-pages.yml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Ensure ccache is available
        run: |
          if ! command -v ccache >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ccache
          fi
          ccache --max-size=300M
          ccache --zero-stats

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WebAssembly app
        run: |
          mkdir -p site
          em++ -std=c++17 -O2 \
            -I./include \
            src/caller/main.cpp \
            src/core/globals.cpp \
            src/core/database.cpp \
            src/core/table.cpp \
            src/handlers/sqlparser.cpp \
            src/handlers/join.cpp \
            -sWASM=1 \
            -sALLOW_MEMORY_GROWTH=1 \
            -sFORCE_FILESYSTEM=1 \
            -sEXIT_RUNTIME=0 \
            -sASYNCIFY \
            -sASYNCIFY_IMPORTS=webReadLineRaw \
            -sASYNCIFY_STACK_SIZE=32768 \
            --shell-file web/shell.html \
            --pre-js web/pre.js \
            --preload-file Databases@/Databases \
            -o site/index.html

          # Prevent GitHub Pages from treating files/folders as Jekyll content.
          touch site/.nojekyll

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
