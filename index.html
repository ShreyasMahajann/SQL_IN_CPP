<!doctypehtml><html lang=en><head><meta charset=utf-8><meta content="width=device-width,initial-scale=1"name=viewport><title>SQL Parser</title><style>:root{--bg:#0b0f10;--panel:#0f1517;--text:#d7e8de;--muted:#87a095;--accent:#44b97f;--border:#1e2b2f;--input-bg:#121a1d}body,html{margin:0;padding:0;width:100%;height:100%;background:radial-gradient(circle at top right,#153228,var(--bg) 40%);color:var(--text);font-family:Consolas,"Courier New",monospace}.app{max-width:980px;margin:0 auto;padding:16px;height:100%;box-sizing:border-box;display:flex;flex-direction:column;gap:10px}.title{color:var(--muted);font-size:13px;letter-spacing:.4px}#terminal{flex:1;margin:0;padding:12px;border:1px solid var(--border);border-radius:8px;background:linear-gradient(180deg,#0a0f11,var(--panel));overflow-y:auto;white-space:pre-wrap;word-break:break-word;line-height:1.35;font-size:14px}.input-row{display:flex;align-items:center;gap:8px}.prompt{color:var(--accent);font-weight:700}#stdin{flex:1;border:1px solid var(--border);border-radius:8px;padding:10px 12px;background:var(--input-bg);color:var(--text);font-family:inherit;font-size:14px;outline:0}#stdin:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(68,185,127,.2)}.help{color:var(--muted);font-size:12px}@media (max-width:640px){.app{padding:10px}#terminal{font-size:13px}#stdin{font-size:13px}}</style></head><body><div class=app><div class=title>SQL Parser</div><pre id=terminal></pre><div class=input-row><span class=prompt>></span> <input autocomplete=off id=stdin placeholder="Type input and press Enter"></div><div class=help>Press Enter to send one input line to the C++ program stdin.</div></div><script>!function(){var n=[],e=[];window.appendTerminalText=function(n){var e=document.getElementById("terminal");e&&(e.textContent+=n,e.scrollTop=e.scrollHeight)},window.consumeInputLine=function(t){e.length>0?e.shift()(t):n.push(t)},window.awaitInputLine=function(){return new Promise((function(t){n.length>0?t(n.shift()):e.push(t)}))},window.addEventListener("DOMContentLoaded",(function(){var n=document.getElementById("stdin");n&&(n.addEventListener("keydown",(function(e){if("Enter"===e.key){e.preventDefault();var t=n.value;n.value="",window.appendTerminalText(t+"\n"),"function"==typeof window.consumeInputLine&&window.consumeInputLine(t)}})),n.focus())}))}()</script><script async src=index.js></script></body></html>
